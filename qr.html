<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AWR demo · 局域网分享</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
           gap:20px; background:#0b0e14; color:#e6e9ef; font-family:-apple-system,"Segoe UI","Microsoft YaHei",system-ui,sans-serif; }
    h1 { font-size:18px; font-weight:600; margin:0; color:#8b93a3; letter-spacing:.5px; }
    #qr { padding:16px; background:#fff; border-radius:14px; }
    .url { font-size:22px; font-variant-numeric:tabular-nums; letter-spacing:.5px;
           background:#11151d; border:1px solid rgba(255,255,255,.1); padding:12px 18px; border-radius:10px; }
    .hint { font-size:13px; color:#8b93a3; max-width:420px; text-align:center; line-height:1.7; }
    a { color:#4c8dff; text-decoration:none; }
  </style>
</head>
<body>
  <h1>同一 WiFi 下扫码打开 AWR demo</h1>
  <div id="qr"></div>
  <div class="url" id="url">…</div>
  <div class="hint">
    用 iPad 相机对准二维码 → 点弹出的链接即可。<br>
    或在 iPad 浏览器直接输入上面的地址。<br>
    （需与这台电脑连同一个 WiFi）
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    // 这台电脑当前的局域网 IP（若 WiFi/IP 变了，改这一行即可）
    const LAN_IP = '10.88.161.190';
    const port = location.port || 8123;
    // 若本页本身就是通过局域网 IP 打开的，用它；否则用上面写死的 LAN_IP
    const host = (location.hostname && !/^(localhost|127\.|::1)/.test(location.hostname)) ? location.hostname : LAN_IP;
    const target = `http://${host}:${port}/index.html`;
    document.getElementById('url').textContent = target;
    new QRCode(document.getElementById('qr'), { text: target, width: 240, height: 240, correctLevel: QRCode.CorrectLevel.M });
  </script>
</body>
</html>
